; PlatformIO configuration.
;
; The project keeps the flat Arduino sketch layout (the .ino plus .h/.cpp files
; in the repo root), so it builds with both the Arduino IDE / arduino-cli and
; PlatformIO. The vendored libraries in ./libraries are shared by both
; toolchains - the TFT_eSPI copy there carries the CYD display configuration
; in its User_Setup.h.

[platformio]
src_dir = .
default_envs = cyd

[env:cyd]
; pioarduino fork of the espressif32 platform - tracks Arduino core 3.x,
; matching the esp32:esp32 3.x core the Arduino IDE / arduino-cli build uses.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Link only the vendored libraries this project actually uses. Pointing
; lib_extra_dirs at ./libraries instead would make the dependency finder walk
; every library in that folder (lvgl alone is ~10k files) on every build,
; which dominates build time on Windows.
lib_deps =
    symlink://libraries/TFT_eSPI
    symlink://libraries/XPT2046_Bitbang_Arduino_Library-2.0.1
    symlink://libraries/WiFiManager
    symlink://libraries/ESP_DoubleResetDetector
    symlink://libraries/ezTime
    symlink://libraries/ArduinoJson
; Only build the sketch sources in the repo root; the vendored libraries are
; resolved through lib_deps, not compiled as project sources.
build_src_filter = +<*.ino> +<*.c> +<*.cpp> -<libraries/> -<build/> -<.pio/>
