; PlatformIO configuration.
;
; The project keeps the flat Arduino sketch layout (the .ino plus .h/.cpp files
; in the repo root), so it builds with both the Arduino IDE / arduino-cli and
; PlatformIO. The vendored libraries in ./libraries are shared by both
; toolchains - the TFT_eSPI copy there carries the CYD display configuration
; in its User_Setup.h.

[platformio]
src_dir = .
default_envs = cyd

[env:cyd]
; pioarduino fork of the espressif32 platform - tracks Arduino core 3.x,
; matching the esp32:esp32 3.x core the Arduino IDE / arduino-cli build uses.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; --- Over-the-air upload (after the first USB flash) -----------------------
; Flash over WiFi instead of USB. The device advertises itself as
; "esp32worldclock" on mDNS; its IP is shown on the System status page.
; If OTA_PASSWORD is set in secrets.h, also add: upload_flags = --auth=<pw>
; Comment these two lines out to flash over USB again.
; upload_protocol = espota
; upload_port = 192.168.50.181
; "Minimal SPIFFS" scheme: two 1.9MB OTA app slots + 128KB SPIFFS, instead of
; the default 1.31MB slots + 1.38MB SPIFFS. The sketch only keeps a <1KB JSON
; config in SPIFFS, and the bigger app slots leave room for new features while
; keeping OTA updates possible. Keep in sync with the PartitionScheme option in
; the README's arduino-cli / Arduino IDE instructions.
board_build.partitions = min_spiffs.csv
; Link only the vendored libraries this project actually uses. Pointing
; lib_extra_dirs at ./libraries instead would make the dependency finder walk
; every library in that folder (lvgl alone is ~10k files) on every build,
; which dominates build time on Windows.
lib_deps =
    symlink://libraries/TFT_eSPI
    symlink://libraries/XPT2046_Bitbang_Arduino_Library-2.0.1
    symlink://libraries/ESP_DoubleResetDetector
    symlink://libraries/ezTime
    symlink://libraries/ArduinoJson
; Only build the sketch sources in the repo root; the vendored libraries are
; resolved through lib_deps, not compiled as project sources.
build_src_filter = +<*.ino> +<*.c> +<*.cpp> -<libraries/> -<build/> -<.pio/>

[env:cyd_debug]
extends = env:cyd

; Debug build for the CYD ESP32 target.
; Build with:
;   pio run -e cyd_debug
;
; Upload with:
;   pio run -e cyd_debug -t upload
;
; Serial monitor:
;   pio device monitor -e cyd_debug
build_type = debug

; Remove size optimization from the release build and use debug-friendly flags.
build_unflags =
    -Os

build_flags =
    -DDEBUG_BUILD=1
    -DCORE_DEBUG_LEVEL=5
    -Og
    -g3
; --- Host unit tests -------------------------------------------------------
; Runs on the development machine (no ESP32 needed) with Unity via
;   pio test -e native
; It compiles ONLY the hardware-independent logic modules (extracted so they
; carry no Arduino/TFT/WiFi dependencies) and links them with the tests in
; test/. Needs a host C++ compiler on PATH; see test/README.md for the MSYS2
; MinGW note on this machine. This env is never flashed to the device.
[env:native]
platform = native
test_build_src = yes
build_src_filter = -<*> +<dateMath.cpp> +<wifiCredentials.cpp> +<timeFormat.cpp> +<textSanitize.cpp> +<marketSession.cpp>
build_flags = -std=gnu++17 -I.
; Unity test framework, pinned as an explicit dependency so the host tests do
; not rely on PlatformIO's auto-provisioning (which resolves to an
; unavailable package on this toolchain).
lib_deps = throwtheswitch/Unity@^2.6.0
lib_ldf_mode = chain+

