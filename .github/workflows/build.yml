# Build verification + firmware releases.
#
# - Every push to main / pull request / manual run: compile firmware for every
#   supported display profile with PlatformIO and upload the images as workflow
#   artifacts.
# - Pushing a tag like v1.2.0 additionally creates a GitHub Release with the
#   board-specific firmware attached:
#     esp32worldclock-<tag>-cyd28-320x240-ota.bin
#     esp32worldclock-<tag>-cyd28-320x240-factory.bin
#     esp32worldclock-<tag>-hosyond40-320x480-ota.bin
#     esp32worldclock-<tag>-hosyond40-320x480-factory.bin
#
# To cut a release:  git tag v1.2.0 && git push origin v1.2.0
#
# CI builds use secrets.h.example verbatim, so released binaries contain no
# WiFi credentials - a freshly flashed device opens the captive setup portal
# (and devices updated over OTA keep their stored WiFi).

name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # create releases on tag builds

jobs:
  # Host unit tests for the hardware-independent logic modules (Unity via
  # PlatformIO's native platform - Ubuntu's system g++ needs no extra setup).
  # The build/release job below gates on this, so a logic regression fails CI
  # before any firmware is published.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-test-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-test-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run host unit tests
        run: pio test -e native

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: cyd
            suffix: cyd28-320x240
            label: CYD 2.8 in 320x240
          - env: hosyond40
            suffix: hosyond40-320x480
            label: Hosyond 4.0 in 320x480
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ~/.platformio holds the pioarduino platform, toolchain and framework
      # (~1GB download on a cold run) - caching it keeps builds to a few minutes.
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      # The build refuses to compile without secrets.h (see
      # genericBaseProject.cpp); the example placeholders are fine for CI.
      - name: Create secrets.h from template
        run: cp secrets.h.example secrets.h

      - name: Build firmware (${{ matrix.label }})
        run: pio run -e "${{ matrix.env }}"

      - name: Stage firmware images (${{ matrix.label }})
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            VERSION="${GITHUB_SHA::7}"
          fi
          mkdir -p out
          cp ".pio/build/${{ matrix.env }}/firmware.bin" \
            "out/esp32worldclock-${VERSION}-${{ matrix.suffix }}-ota.bin"
          if [ -f ".pio/build/${{ matrix.env }}/firmware.factory.bin" ]; then
            cp ".pio/build/${{ matrix.env }}/firmware.factory.bin" \
              "out/esp32worldclock-${VERSION}-${{ matrix.suffix }}-factory.bin"
          fi
          ls -l out/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.suffix }}
          path: out/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: firmware-*
          path: out
          merge-multiple: true

      - name: List release files
        run: ls -l out/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          body: |
            Firmware images for the ESP32 World Clock. Download the file that
            matches your display board:

            - **CYD 2.8" 320x240 ILI9341**:
              `esp32worldclock-*-cyd28-320x240-*.bin`
            - **Hosyond/LCDWiki 4.0" 320x480 ST7796S**:
              `esp32worldclock-*-hosyond40-320x480-*.bin`

            - **`-ota.bin`** — app image. Upload it through the device's web
              updater at `http://esp32worldclock.local/update` (or via espota).
            - **`-factory.bin`** — full image (bootloader + partition table +
              app) for a first flash over USB:
              `esptool.py write_flash 0x0 esp32worldclock-*-factory.bin`

            These binaries are built from `secrets.h.example`, so they contain
            no WiFi credentials: a freshly flashed device opens the
            per-device setup captive portal for WiFi setup, and OTA is
            unauthenticated until you build locally with an `OTA_PASSWORD`.
            Devices updated over OTA keep their stored WiFi and display
            settings.
