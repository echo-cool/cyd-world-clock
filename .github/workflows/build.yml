# Build verification + firmware releases.
#
# - Every push to main / pull request / manual run: compile the firmware with
#   PlatformIO (same toolchain as local `pio run`) and upload the images as a
#   workflow artifact.
# - Pushing a tag like v1.2.0 additionally creates a GitHub Release with the
#   firmware attached:
#     esp32worldclock-<tag>-ota.bin      upload via the web updater (/update)
#                                        or espota - app image only
#     esp32worldclock-<tag>-factory.bin  full image (bootloader + partition
#                                        table + app) for a first USB flash:
#                                        esptool write_flash 0x0 <file>
#
# To cut a release:  git tag v1.2.0 && git push origin v1.2.0
#
# CI builds use secrets.h.example verbatim, so released binaries contain no
# WiFi credentials - a freshly flashed device opens the WiFiManager captive
# portal (and devices updated over OTA keep their stored WiFi).

name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # create releases on tag builds

jobs:
  # Host unit tests for the hardware-independent logic modules (Unity via
  # PlatformIO's native platform - Ubuntu's system g++ needs no extra setup).
  # The build/release job below gates on this, so a logic regression fails CI
  # before any firmware is published.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-test-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-test-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run host unit tests
        run: pio test -e native

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ~/.platformio holds the pioarduino platform, toolchain and framework
      # (~1GB download on a cold run) - caching it keeps builds to a few minutes.
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      # The build refuses to compile without secrets.h (see
      # genericBaseProject.cpp); the example placeholders are fine for CI.
      - name: Create secrets.h from template
        run: cp secrets.h.example secrets.h

      - name: Build firmware
        run: pio run

      - name: Stage firmware images
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            VERSION="${GITHUB_SHA::7}"
          fi
          mkdir -p out
          cp .pio/build/cyd/firmware.bin "out/esp32worldclock-${VERSION}-ota.bin"
          if [ -f .pio/build/cyd/firmware.factory.bin ]; then
            cp .pio/build/cyd/firmware.factory.bin "out/esp32worldclock-${VERSION}-factory.bin"
          fi
          ls -l out/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: out/

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          body: |
            Firmware images for the ESP32 World Clock (CYD, min_spiffs partitions):

            - **`-ota.bin`** — app image. Upload it through the device's web
              updater at `http://esp32worldclock.local/update` (or via espota).
            - **`-factory.bin`** — full image (bootloader + partition table +
              app) for a first flash over USB:
              `esptool.py write_flash 0x0 esp32worldclock-*-factory.bin`

            These binaries are built from `secrets.h.example`, so they contain
            no WiFi credentials: a freshly flashed device opens the
            `esp32Project` captive portal for setup, and OTA is unauthenticated
            until you build locally with an `OTA_PASSWORD`. Devices updated
            over OTA keep their stored WiFi and display settings.
